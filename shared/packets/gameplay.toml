[[builders]]
id = "input_packet"
args = ["forward", "back", "right", "left", "primary_fire", "secondary_fire"]

[builders.body]
type = "input"

[builders.body.input]
forward = "$forward"
back = "$back"
right = "$right"
left = "$left"
primary_fire = "$primary_fire"
secondary_fire = "$secondary_fire"

[[builders]]
id = "respawn_packet"

[builders.body]
type = "respawn"

[[builders]]
id = "pause_request_packet"

[builders.body]
type = "pause_request"

[[builders]]
id = "set_target_player_request_packet"
args = ["target_kind", "target_id"]

[builders.body]
type = "set_target_player_request"
target_kind = "$target_kind"
target_id = "$target_id"

[[builders]]
id = "select_target_at_position_request_packet"
args = ["x", "y", "target_kind", "target_id"]

[builders.body]
type = "select_target_at_position_request"
x = "$x"
y = "$y"
target_kind = "$target_kind"
target_id = "$target_id"

[[builders]]
id = "clear_target_request_packet"

[builders.body]
type = "clear_target_request"

[[builders]]
id = "client_config_packet"
args = ["visible_world_width", "visible_world_height"]

[builders.body]
type = "client_config"

[builders.body.config]
visible_world_width = "$visible_world_width"
visible_world_height = "$visible_world_height"
