info:
  name: login
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (!body || !body.token) {
          throw new Error("Login response did not include token");
        }

        bru.setVar("auth_token", body.token);

        console.log("Captured auth_token from login response");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
