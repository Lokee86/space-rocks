info:
  name: me
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/api/auth/me"
  headers:
    - name: Authorization
      value: Bearer {{auth_token}}
  auth: inherit

docs: |-
  # Auth Me

  This request checks bearer-token API access and is separate from the browser Discord OAuth flow.
  `auth_token` must be the raw Space Rocks bearer token only, with no `Bearer ` prefix.
  Login and register scripts may set `auth_token` automatically.

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
