info:
  name: register
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/auth/register"
  body:
    type: json
    data: |-
      {
        "display_name": "{{display_name}}",
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (!body || !body.token) {
          throw new Error("Register response did not include token");
        }

        bru.setVar("auth_token", body.token);

        console.log("Captured auth_token from register response");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
