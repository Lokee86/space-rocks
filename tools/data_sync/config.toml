[sot.constants]
path = "shared/game_data.toml"

[sot.packets]
path = "shared/packets/packets.toml"

[constants.go]
files = ["services/game-server/internal/constants/constants.go"]
sections = [
  "constants.server.runtime",
  "constants.server.player_movement",
  "constants.shared.player_state",
  "constants.server.player_session",
  "constants.server.world",
  "constants.server.scoring",
  "constants.server.asteroids",
  "constants.shared.asteroid_visual",
  "constants.server.bullets",
]
owns = [
  "constants.server.runtime",
  "constants.server.player_movement",
  "constants.shared.player_state",
  "constants.server.player_session",
  "constants.server.world",
  "constants.server.scoring",
  "constants.server.asteroids",
  "constants.shared.asteroid_visual",
  "constants.server.bullets",
]

[constants.gds]
files = ["client/scripts/constants/constants.gd"]
sections = [
  "constants.shared.player_state",
  "constants.client.presentation",
  "constants.shared.asteroid_visual",
]
owns = ["constants.client.presentation"]

[constants.ts]
enabled = false
files = []
sections = []
owns = []

[packets.go]
files = [
  "services/game-server/internal/game/entities/packets_generated.go",
  "services/game-server/internal/game/packets.go",
]
sections = ["packets"]
owns = []

[packets.gds]
files = ["client/scripts/networking/packets.gd"]
sections = ["packets"]
owns = []

[packets.ts]
enabled = false
files = []
sections = []
owns = []
